name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      e2e:
        description: 'Run E2E Android tests'
        required: false
        default: false
        type: boolean

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      shared: ${{ steps.filter.outputs.shared }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'Backend/**'
            web:
              - 'Frontend/Frontend-web/**'
            mobile:
              - 'Frontend/Frontend-mobile/**'
            shared:
              - 'Frontend/shared/**'
            ci:
              - '.github/**'

  quality:
    name: Quality (${{ matrix.package }})
    needs: changes
    if: always()
    strategy:
      fail-fast: false
      matrix:
        package: [backend, web, mobile, shared]
        include:
          - package: backend
            workdir: Backend
            typecheck-script: type-check
            needs-prisma: true
          - package: web
            workdir: Frontend/Frontend-web
            typecheck-script: type-check
            needs-prisma: false
          - package: mobile
            workdir: Frontend/Frontend-mobile
            typecheck-script: type-check
            needs-prisma: false
          - package: shared
            workdir: Frontend/shared
            typecheck-script: typecheck
            needs-prisma: false
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.workdir }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        if: >-
          (matrix.package == 'backend' && needs.changes.outputs.backend == 'true') ||
          needs.changes.outputs.ci == 'true'
        with:
          version: 8.15.4

      - uses: actions/setup-node@v4
        if: >-
          (matrix.package == 'backend' && needs.changes.outputs.backend == 'true') ||
          (matrix.package == 'web'     && needs.changes.outputs.web     == 'true') ||
          (matrix.package == 'mobile'  && needs.changes.outputs.mobile  == 'true') ||
          (matrix.package == 'shared'  && needs.changes.outputs.shared  == 'true') ||
          needs.changes.outputs.ci == 'true'
        with:
          node-version: 20
          cache: ${{ matrix.package == 'backend' && 'pnpm' || 'npm' }}
          cache-dependency-path: ${{ matrix.package == 'backend' && 'Backend/pnpm-lock.yaml' || 'package-lock.json' }}

      - name: Install Backend dependencies
        if: >-
          (matrix.package == 'backend' && needs.changes.outputs.backend == 'true') ||
          needs.changes.outputs.ci == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install workspace dependencies
        if: >-
          (matrix.package != 'backend') &&
          ((matrix.package == 'web'     && needs.changes.outputs.web     == 'true') ||
           (matrix.package == 'mobile'  && needs.changes.outputs.mobile  == 'true') ||
           (matrix.package == 'shared'  && needs.changes.outputs.shared  == 'true') ||
           needs.changes.outputs.ci == 'true')
        run: npm ci
        working-directory: .

      - name: Generate Prisma Client
        if: >-
          matrix.needs-prisma &&
          ((matrix.package == 'backend' && needs.changes.outputs.backend == 'true') ||
           needs.changes.outputs.ci == 'true')
        run: npx prisma generate

      - name: Lint
        if: >-
          (matrix.package == 'backend' && needs.changes.outputs.backend == 'true') ||
          (matrix.package == 'web'     && needs.changes.outputs.web     == 'true') ||
          (matrix.package == 'mobile'  && needs.changes.outputs.mobile  == 'true') ||
          (matrix.package == 'shared'  && needs.changes.outputs.shared  == 'true') ||
          needs.changes.outputs.ci == 'true'
        run: npm run lint

      - name: Type check
        if: >-
          (matrix.package == 'backend' && needs.changes.outputs.backend == 'true') ||
          (matrix.package == 'web'     && needs.changes.outputs.web     == 'true') ||
          (matrix.package == 'mobile'  && needs.changes.outputs.mobile  == 'true') ||
          (matrix.package == 'shared'  && needs.changes.outputs.shared  == 'true') ||
          needs.changes.outputs.ci == 'true'
        run: npm run ${{ matrix.typecheck-script }}

      - name: Test with coverage
        if: >-
          (matrix.package == 'backend' && needs.changes.outputs.backend == 'true') ||
          (matrix.package == 'web'     && needs.changes.outputs.web     == 'true') ||
          (matrix.package == 'mobile'  && needs.changes.outputs.mobile  == 'true') ||
          (matrix.package == 'shared'  && needs.changes.outputs.shared  == 'true') ||
          needs.changes.outputs.ci == 'true'
        run: npm run test -- --coverage --passWithNoTests
        env:
          CI: true

      - name: Integration tests (Backend)
        if: >-
          (matrix.package == 'backend' && needs.changes.outputs.backend == 'true') ||
          needs.changes.outputs.ci == 'true'
        run: npm run test:e2e -- --coverage --coverageDirectory=coverage-e2e
        env:
          CI: true

      - name: Check coverage threshold (Sprint 4)
        if: >-
          (matrix.package == 'backend' && needs.changes.outputs.backend == 'true') ||
          needs.changes.outputs.ci == 'true'
        run: npx jest --config ./test/jest-e2e.json --coverage --coverageDirectory=coverage-e2e --coverageThreshold='{"global":{"statements":70,"branches":70,"functions":70,"lines":70}}'

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.package }}
          path: |
            ${{ matrix.workdir }}/coverage/
            ${{ matrix.workdir }}/coverage-e2e/

      - name: Report coverage to PR
        if: github.event_name == 'pull_request' && always()
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-file: ./coverage/lcov.info
          delete-old-comments: true

  e2e-android:
    name: E2E Android (Maestro)
    needs: changes
    if: >-
      (github.event_name == 'pull_request' && github.base_ref == 'main' &&
       needs.changes.outputs.mobile == 'true') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.e2e == 'true')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/Frontend-mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci
        working-directory: .

      - name: Install Maestro CLI
        run: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Add Maestro to PATH
        run: echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Boot Android emulator (API 34)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -cache-size 512
          disable-animations: true
          script: |
            # Wait for emulator to be ready
            adb wait-for-device
            # Install debug APK
            adb install android/app/build/outputs/apk/debug/app-debug.apk || echo "APK not found, skipping install"
            # Run Maestro flow
            $HOME/.maestro/bin/maestro test maestro/flows/study-session.yaml || true

      - name: Upload Maestro artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts
          path: ~/.maestro/output/

  notify-failure:
    name: Notify Slack on failure
    needs: [quality, e2e-android]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":rotating_light: CI pipeline failed for ${{ github.repository }} on branch ${{ github.ref_name }}. Check the workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
