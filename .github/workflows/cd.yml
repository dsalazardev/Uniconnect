name: CD

on:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'Backend/**'
            web:
              - 'Frontend/Frontend-web/**'
            mobile:
              - 'Frontend/Frontend-mobile/**'
            shared:
              - 'Frontend/shared/**'

  deploy-backend:
    name: Deploy Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        working-directory: Backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Health check
        run: |
          sleep 15
          curl --fail-with-body https://uniconnect-backend-core-black-wave-3099.fly.dev/api/health

  deploy-web:
    name: Deploy Web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        working-directory: Frontend/Frontend-web
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-mobile:
    name: Trigger Mobile EAS Build
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: Frontend/Frontend-mobile

      - name: Trigger EAS Build (preview)
        run: npx eas build --profile preview --platform all --non-interactive
        working-directory: Frontend/Frontend-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  notify-failure:
    name: Notify Slack on failure
    needs: [deploy-backend, deploy-web, deploy-mobile]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":rotating_light: CD deployment failed for ${{ github.repository }} on branch ${{ github.ref_name }}. Check the workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
