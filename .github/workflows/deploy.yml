name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.workflow_run.head_sha }}
          ref: ${{ github.event.workflow_run.head_sha }}
          filters: |
            backend:
              - 'Backend/**'
            web:
              - 'Frontend/Frontend-web/**'
            mobile:
              - 'Frontend/Frontend-mobile/**'

  deploy-backend:
    name: Deploy Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        working-directory: Backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Health check
        run: |
          sleep 15
          curl --fail-with-body https://uniconnect-backend-core-black-wave-3099.fly.dev/api/health

  deploy-web:
    name: Deploy Web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        working-directory: Frontend/Frontend-web
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-mobile:
    name: Trigger Mobile EAS Build
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: Frontend/Frontend-mobile

      - name: Trigger EAS Build (preview)
        run: npx eas build --profile preview --platform all --non-interactive
        working-directory: Frontend/Frontend-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: [deploy-backend, deploy-web, deploy-mobile]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract version from package.json
        id: version
        run: echo "version=$(node -p "require('./Backend/package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.event.workflow_run.run_number }}
          name: "Release v${{ steps.version.outputs.version }} (build ${{ github.event.workflow_run.run_number }})"
          body: |
            ## Deploy Automático

            **Commit:** ${{ github.event.workflow_run.head_sha }}
            **Branch:** ${{ github.event.workflow_run.head_branch }}

            ### Despliegues
            - **Backend:** https://uniconnect-backend-core-black-wave-3099.fly.dev/api/health
            - **Web:** https://frontend-uc-spring-dust-5949.fly.dev
            - **Mobile (EAS):** Build triggered on Expo — check https://expo.dev/accounts/salazar04/projects/uniconnect_g/builds
          target_commitish: ${{ github.event.workflow_run.head_sha }}

  notify-failure:
    name: Notify Slack on failure
    needs: [deploy-backend, deploy-web, deploy-mobile]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":rotating_light: CD deployment failed for ${{ github.repository }} on branch ${{ github.ref_name }}. Check the workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
